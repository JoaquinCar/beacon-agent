linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - goimports
    - revive
    - bodyclose
    - noctx

linters-settings:
  errcheck:
    # Ignore unchecked Write calls in test HTTP handlers
    exclude-functions:
      - (net/http.ResponseWriter).Write

  revive:
    rules:
      - name: exported
        disabled: true  # don't require doc comments on all exported symbols yet

  noctx:
    # all http calls in this codebase use NewRequestWithContext

issues:
  exclude-rules:
    # Test files get looser rules
    - path: _test\.go
      linters:
        - errcheck
        - revive
