name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: build
        run: go build -o bin/beacon cmd/beacon/main.go

      # Deploy step — target platform TBD (Week 5)
