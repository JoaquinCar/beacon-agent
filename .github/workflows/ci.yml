name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: test
        run: go test -race ./...

      # Coverage is measured only on packages that have test files.
      # Stub packages (papers, briefing, delivery, scheduler) are excluded
      # until their tests are added in later weeks.
      - name: coverage
        run: |
          TESTED=$(go list ./... | xargs -I{} sh -c 'go list -f "{{if .TestGoFiles}}{{.ImportPath}}{{end}}" {}' | tr '\n' ' ')
          go test -coverprofile=coverage.out $TESTED

      - name: coverage gate (≥ 80%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 80) { print "Coverage " c "% is below 80% threshold"; exit 1 } }'
